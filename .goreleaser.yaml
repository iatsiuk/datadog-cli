version: 2

builds:
  - main: ./cmd/datadog-cli
    binary: datadog-cli
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

homebrew_casks:
  - name: datadog-cli
    repository:
      owner: iatsiuk
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/iatsiuk/datadog-cli"
    description: "CLI tool for Datadog - query logs, traces, and events from the terminal"
    hooks:
      post:
        install: |
          system_command "/bin/sh", args: ["-c", "xattr -d com.apple.quarantine '#{staged_path}/datadog-cli' 2>/dev/null; true"]
    caveats: |
      Quarantine attribute (com.apple.quarantine) is automatically removed
      from the datadog-cli binary during installation to prevent Gatekeeper warnings.
      See: https://github.com/Homebrew/brew/issues/20755

      To uninstall:
        brew uninstall --cask iatsiuk/tap/datadog-cli

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
